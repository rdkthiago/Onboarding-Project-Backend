services:
  db:
    image: postgres:15
    container_name: onboarding_pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: onboarding_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
    container_name: onboarding_api
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db 
      - DB_PORT=5432 
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=onboarding_db
      - RESEND_API_KEY=${RESEND_API_KEY} 
    depends_on:
      - db

volumes:
  pgdata: